# ============================================================
# nginx.conf — Load Balancer + WebSocket Support
# Phase 1: 1 server  (~5K users)
# Phase 2: 2 servers (~10K users) — uncomment second upstream
# Phase 3: 3-4 servers — add more upstream entries
# ============================================================

upstream gps_relay {
    # Sticky sessions via IP hash (keeps WS connections stable)
    ip_hash;

    server 127.0.0.1:3001;
    # server 127.0.0.1:3002;  # Phase 2: uncomment for 2nd server
    # server 127.0.0.1:3003;  # Phase 3: uncomment for 3rd server
}

server {
    listen 80;
    server_name _;

    # WebSocket + HTTP proxy
    location / {
        proxy_pass         http://gps_relay;
        proxy_http_version 1.1;

        # WebSocket upgrade headers (MANDATORY)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeouts — increase for long-lived WS connections
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;

        # Disable buffering for real-time data
        proxy_buffering off;
    }

    # Health check endpoint (no auth needed)
    location /health {
        proxy_pass         http://gps_relay/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log off;
    }
}
